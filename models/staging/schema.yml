version: 2

sources:
  - name: ldap
    description: Raw LDAP data extracted by tap-ldap
    tables:
      - name: users
        description: LDAP user entries
        columns:
          - name: dn
            description: Distinguished Name
            tests:
              - not_null
              - unique
          - name: uid
            description: User ID
            tests:
              - not_null
              - unique
          - name: mail
            description: Email address
            tests:
              - unique

      - name: groups
        description: LDAP group entries
        columns:
          - name: dn
            description: Distinguished Name
            tests:
              - not_null
              - unique
          - name: cn
            description: Common Name (group name)
            tests:
              - not_null
              - unique

      - name: organizational_units
        description: LDAP organizational unit entries
        columns:
          - name: dn
            description: Distinguished Name
            tests:
              - not_null
              - unique
          - name: ou
            description: Organizational Unit name
            tests:
              - not_null

models:
  - name: stg_users
    description: Staged and transformed user data
    columns:
      - name: dn
        description: Distinguished Name
        tests:
          - not_null
          - unique
      - name: uid
        description: User ID
        tests:
          - not_null
          - unique
      - name: email
        description: Email address
        tests:
          - unique:
              where: "email is not null"
      - name: account_type
        description: Type of user account
        tests:
          - accepted_values:
              values:
                [
                  "Employee",
                  "Service Account",
                  "Application Account",
                  "Standard User",
                ]
      - name: is_disabled
        description: Whether the account is disabled
        tests:
          - not_null

  - name: stg_groups
    description: Staged and transformed group data
    columns:
      - name: dn
        description: Distinguished Name
        tests:
          - not_null
          - unique
      - name: group_name
        description: Group name
        tests:
          - not_null
          - unique
      - name: group_category
        description: Security or Distribution group
        tests:
          - accepted_values:
              values: ["Security", "Distribution"]
      - name: member_count
        description: Number of members in the group
        tests:
          - not_null

  - name: stg_org_units
    description: Staged and transformed organizational unit data
    columns:
      - name: dn
        description: Distinguished Name
        tests:
          - not_null
          - unique
      - name: ou_name
        description: Organizational unit name
        tests:
          - not_null
      - name: hierarchy_depth
        description: Depth in the OU hierarchy
        tests:
          - not_null
      - name: ou_type
        description: Type of organizational unit
        tests:
          - accepted_values:
              values:
                [
                  "User Container",
                  "Group Container",
                  "Computer Container",
                  "Service Container",
                  "Business Unit",
                  "General Container",
                ]
