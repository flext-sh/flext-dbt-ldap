version: 2

models:
  - name: int_user_groups
    description: User-group membership relationships with enriched information
    columns:
      - name: uid
        description: User ID
        tests:
          - not_null
      - name: user_dn
        description: User's Distinguished Name
      - name: group_dn
        description: Group's Distinguished Name
      - name: group_name
        description: Name of the group
      - name: is_direct_member
        description: Whether this is a direct membership (not inherited)
      - name: total_group_count
        description: Total number of groups the user belongs to
      - name: security_group_count
        description: Number of security groups the user belongs to
      - name: primary_group
        description: User's primary group (alphabetically first)

  - name: int_org_hierarchy
    description: Organizational unit hierarchy with parent-child relationships
    columns:
      - name: dn
        description: Distinguished Name of the OU
        tests:
          - not_null
          - unique
      - name: ou_name
        description: Name of the organizational unit
      - name: path
        description: Full hierarchical path from root
      - name: root_ou_dn
        description: DN of the root OU in this hierarchy
      - name: level_from_root
        description: Distance from the root OU
      - name: direct_child_count
        description: Number of direct child OUs
      - name: total_descendant_count
        description: Total number of descendant OUs
      - name: is_leaf_node
        description: Whether this OU has no children
