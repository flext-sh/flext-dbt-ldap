version: 2

models:
  - name: dim_users
    description: User dimension table with enriched user information
    columns:
      - name: user_id
        description: Unique user identifier (uid)
        tests:
          - not_null
          - unique
      - name: email
        description: User's email address
        tests:
          - unique:
              where: "email is not null"
      - name: is_stale_account
        description: Whether the account hasn't been modified in over a year
      - name: total_groups
        description: Total number of groups the user belongs to
      - name: organizational_unit_id
        description: Foreign key to organizational unit
        tests:
          - relationships:
              to: ref('int_org_hierarchy')
              field: dn

  - name: dim_groups
    description: Group dimension table with enriched group information
    columns:
      - name: group_id
        description: Unique group identifier (cn)
        tests:
          - not_null
          - unique
      - name: group_size_category
        description: Size classification of the group
        tests:
          - accepted_values:
              values: ["Large", "Medium", "Small", "Empty"]
      - name: is_orphaned
        description: Empty groups older than 90 days
      - name: organizational_unit_id
        description: Foreign key to organizational unit
        tests:
          - relationships:
              to: ref('int_org_hierarchy')
              field: dn

  - name: fact_memberships
    description: Fact table for user-group membership relationships
    columns:
      - name: user_id
        description: User identifier
        tests:
          - not_null
          - relationships:
              to: ref('dim_users')
              field: user_id
      - name: group_id
        description: Group identifier
        tests:
          - not_null
          - relationships:
              to: ref('dim_groups')
              field: group_id
      - name: is_direct_member
        description: Whether this is a direct membership
      - name: same_ou_membership
        description: Whether user and group are in the same OU
      - name: is_primary_group
        description: Whether this is the user's primary group
    tests:
      - unique:
          column_names: ["user_id", "group_id"]
