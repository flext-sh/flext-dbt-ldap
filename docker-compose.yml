version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: dbt-ldap-postgres
    environment:
      POSTGRES_DB: dbt_ldap_test
      POSTGRES_USER: dbt_user
      POSTGRES_PASSWORD: dbt_password
    ports:
      - "25432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./tests/e2e/sql:/docker-entrypoint-initdb.d
    networks:
      - dbt-network

  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.7.latest
    container_name: dbt-ldap-runner
    environment:
      DBT_PROFILES_DIR: /app/profiles
      DBT_PROJECT_DIR: /app/dbt_project
    volumes:
      - .:/app/dbt_project
      - ./tests/e2e/profiles:/app/profiles
    depends_on:
      - postgres
    networks:
      - dbt-network
    command: ["sleep", "infinity"]

networks:
  dbt-network:
    driver: bridge

volumes:
  postgres_data:
